<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=2.0, user-scalable=yes">
  <title>Harmony Hub · grocery · Lakshmi Paati</title>
  <style>
    /* GLOBAL RESET & DESIGN TOKENS */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      /* soft peach pastel background */
      background: linear-gradient(145deg, #FFE5D0 0%, #FFD9B8 100%);
      font-family: 'Segoe UI', 'Roboto', system-ui, -apple-system, 'Helvetica Neue', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 12px;
      margin: 0;
    }

    /* main container – fully responsive */
    .grocery-mode {
      width: 100%;
      max-width: 700px;
      background-color: transparent;
      display: flex;
      flex-direction: column;
      gap: 24px;
      padding: 16px 12px;
    }

    /* 🔝 HEADER with back arrow */
    .header-control {
      display: flex;
      align-items: center;
      width: 100%;
      position: relative;
      margin-bottom: 10px;
    }

    .back-arrow {
      font-size: clamp(36px, 10vw, 48px);
      line-height: 1;
      color: #2E2E2E;
      text-decoration: none;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: transform 0.2s ease-in-out;
      display: inline-flex;
      align-items: center;
      padding: 8px 8px 8px 0;
      background: none;
      border: none;
      opacity: 0.8;
    }

    .back-arrow:active {
      transform: scale(0.9);
    }

    .header-title {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      color: #2E2E2E;
      font-size: clamp(26px, 7vw, 36px);
      font-weight: 600;
      white-space: nowrap;
    }

    @media (max-width: 380px) {
      .header-title {
        font-size: 24px;
        white-space: normal;
        text-align: center;
        width: 100%;
        position: static;
        transform: none;
        margin-left: 10px;
      }
      .header-control {
        justify-content: flex-start;
      }
    }

    /* 🛒 PRODUCT GRID - 2 COLUMN LAYOUT */
    .product-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
      margin: 15px 0 10px;
    }

    @media (max-width: 450px) {
      .product-grid {
        gap: 15px;
      }
    }

    /* PRODUCT CARD - big square cards */
    .product-card {
      background-color: #FFFFFF;
      border-radius: 25px;
      box-shadow: 0 15px 30px rgba(0, 0, 0, 0.08), 0 5px 10px rgba(0, 0, 0, 0.03);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      transition: all 0.3s ease;
      border: 1px solid rgba(255,255,255,0.5);
      aspect-ratio: 3/4; /* makes it square-ish but with room for content */
    }

    /* image area - occupies 70% of card */
    .product-image {
      background-color: #FFF5E6;
      height: 65%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 15px;
    }

    .product-image img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      filter: drop-shadow(0 5px 10px rgba(0,0,0,0.1));
    }

    /* fallback emoji for demo */
    .product-emoji {
      font-size: clamp(70px, 15vw, 90px);
    }

    /* product details */
    .product-details {
      padding: 12px 10px 15px;
      display: flex;
      flex-direction: column;
      flex: 1;
    }

    .product-name {
      font-size: clamp(20px, 5vw, 24px);
      font-weight: 600;
      color: #2E2E2E;
      margin-bottom: 10px;
      text-align: center;
    }

    /* quantity controls */
    .quantity-controls {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-top: auto;
    }

    .qty-btn {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background-color: #F4C430; /* mustard */
      border: none;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      font-weight: 700;
      color: #FFFFFF;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      box-shadow: 0 5px 10px rgba(244, 196, 48, 0.3);
      transition: all 0.2s ease;
    }

    .qty-btn.minus {
      background-color: #F4C430; /* same mustard */
    }

    .qty-btn:active {
      transform: scale(0.9);
    }

    .quantity-number {
      font-size: 28px;
      font-weight: 700;
      color: #2E2E2E;
      min-width: 40px;
      text-align: center;
    }

    /* price tag (optional but nice) */
    .product-price {
      font-size: 18px;
      color: #5DA9A4;
      font-weight: 600;
      text-align: center;
      margin-bottom: 5px;
    }

    /* 🔽 BOTTOM - CONFIRM ORDER BUTTON */
    .confirm-container {
      margin-top: 20px;
      padding: 10px 0 20px;
    }

    .confirm-btn {
      background-color: #5DA9A4; /* muted teal */
      border: none;
      border-radius: 40px;
      height: 80px;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #FFFFFF;
      font-size: clamp(28px, 7vw, 34px);
      font-weight: 700;
      box-shadow: 0 15px 30px rgba(93, 169, 164, 0.3);
      transition: all 0.3s ease-in-out;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      border: 1px solid rgba(255,255,255,0.2);
      letter-spacing: 1px;
    }

    .confirm-btn:active {
      transform: scale(0.97);
      box-shadow: 0 10px 20px rgba(93, 169, 164, 0.4);
    }

    /* success animation */
    .confirm-btn.success {
      background-color: #F4C430; /* mustard for success */
      animation: successPulse 0.5s ease-in-out;
    }

    @keyframes successPulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.05); background-color: #F4C430; }
      100% { transform: scale(1); background-color: #5DA9A4; }
    }

    /* TOAST NOTIFICATION */
    .toast-message {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background-color: #2E2E2E;
      color: #FFFFFF;
      font-size: 24px;
      font-weight: 500;
      padding: 18px 36px;
      border-radius: 60px;
      box-shadow: 0 15px 30px rgba(0,0,0,0.2);
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.4s ease-in-out, transform 0.4s ease-in-out, visibility 0.4s;
      z-index: 1000;
      white-space: nowrap;
      max-width: 90vw;
      text-align: center;
      border: 1px solid rgba(255,255,255,0.2);
    }

    .toast-message.show {
      opacity: 1;
      visibility: visible;
      transform: translateX(-50%) translateY(0);
    }

    @media (max-width: 450px) {
      .toast-message {
        font-size: 20px;
        padding: 16px 28px;
        bottom: 20px;
      }
    }

    /* order summary (optional) */
    .order-summary {
      background: rgba(255,255,255,0.5);
      backdrop-filter: blur(5px);
      border-radius: 30px;
      padding: 15px 20px;
      margin: 10px 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 22px;
      font-weight: 600;
      color: #2E2E2E;
    }

    .total-items {
      color: #5DA9A4;
    }

    /* small note */
    .note {
      font-size: 18px;
      color: #6B6B6B;
      text-align: center;
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <div class="grocery-mode">

    <!-- 🔝 HEADER with back arrow to dashboard -->
    <div class="header-control">
      <a href="dashboard.html" class="back-arrow" id="backArrow" aria-label="Go back to dashboard">←</a>
      <div class="header-title">Grocery</div>
    </div>

    <!-- 🛒 PRODUCT GRID - 2 COLUMN LAYOUT -->
    <div class="product-grid" id="productGrid">
      <!-- Product 1: Milk -->
      <div class="product-card" data-product-id="milk" data-product-name="Milk">
        <div class="product-image">
          <div class="product-emoji">🥛</div>
        </div>
        <div class="product-details">
          <div class="product-name">Milk</div>
          <div class="product-price">₹40</div>
          <div class="quantity-controls">
            <button class="qty-btn minus" onclick="adjustQuantity(this, -1)">−</button>
            <span class="quantity-number" id="qty-milk">1</span>
            <button class="qty-btn plus" onclick="adjustQuantity(this, 1)">+</button>
          </div>
        </div>
      </div>

      <!-- Product 2: Bread -->
      <div class="product-card" data-product-id="bread" data-product-name="Bread">
        <div class="product-image">
          <div class="product-emoji">🍞</div>
        </div>
        <div class="product-details">
          <div class="product-name">Bread</div>
          <div class="product-price">₹35</div>
          <div class="quantity-controls">
            <button class="qty-btn minus" onclick="adjustQuantity(this, -1)">−</button>
            <span class="quantity-number" id="qty-bread">1</span>
            <button class="qty-btn plus" onclick="adjustQuantity(this, 1)">+</button>
          </div>
        </div>
      </div>

      <!-- Product 3: Eggs -->
      <div class="product-card" data-product-id="eggs" data-product-name="Eggs">
        <div class="product-image">
          <div class="product-emoji">🥚</div>
        </div>
        <div class="product-details">
          <div class="product-name">Eggs</div>
          <div class="product-price">₹60</div>
          <div class="quantity-controls">
            <button class="qty-btn minus" onclick="adjustQuantity(this, -1)">−</button>
            <span class="quantity-number" id="qty-eggs">1</span>
            <button class="qty-btn plus" onclick="adjustQuantity(this, 1)">+</button>
          </div>
        </div>
      </div>

      <!-- Product 4: Apples -->
      <div class="product-card" data-product-id="apples" data-product-name="Apples">
        <div class="product-image">
          <div class="product-emoji">🍎</div>
        </div>
        <div class="product-details">
          <div class="product-name">Apples</div>
          <div class="product-price">₹120</div>
          <div class="quantity-controls">
            <button class="qty-btn minus" onclick="adjustQuantity(this, -1)">−</button>
            <span class="quantity-number" id="qty-apples">1</span>
            <button class="qty-btn plus" onclick="adjustQuantity(this, 1)">+</button>
          </div>
        </div>
      </div>

      <!-- Product 5: Rice -->
      <div class="product-card" data-product-id="rice" data-product-name="Rice">
        <div class="product-image">
          <div class="product-emoji">🍚</div>
        </div>
        <div class="product-details">
          <div class="product-name">Rice</div>
          <div class="product-price">₹80</div>
          <div class="quantity-controls">
            <button class="qty-btn minus" onclick="adjustQuantity(this, -1)">−</button>
            <span class="quantity-number" id="qty-rice">1</span>
            <button class="qty-btn plus" onclick="adjustQuantity(this, 1)">+</button>
          </div>
        </div>
      </div>

      <!-- Product 6: Oil -->
      <div class="product-card" data-product-id="oil" data-product-name="Oil">
        <div class="product-image">
          <div class="product-emoji">🫒</div>
        </div>
        <div class="product-details">
          <div class="product-name">Oil</div>
          <div class="product-price">₹150</div>
          <div class="quantity-controls">
            <button class="qty-btn minus" onclick="adjustQuantity(this, -1)">−</button>
            <span class="quantity-number" id="qty-oil">1</span>
            <button class="qty-btn plus" onclick="adjustQuantity(this, 1)">+</button>
          </div>
        </div>
      </div>
    </div>

    <!-- order summary (optional but helpful) -->
    <div class="order-summary">
      <span>Total Items:</span>
      <span class="total-items" id="totalItems">6</span>
    </div>

    <!-- 🔽 BOTTOM - CONFIRM ORDER BUTTON -->
    <div class="confirm-container">
      <button class="confirm-btn" id="confirmBtn">✅ Confirm Order</button>
    </div>

    <!-- small note -->
    <div class="note">tap + / - to change quantity</div>
  </div>

  <!-- TOAST (hidden by default) -->
  <div class="toast-message" id="toast">Order placed successfully 🎉</div>

  <script>
    (function() {
      // DOM elements
      const confirmBtn = document.getElementById('confirmBtn');
      const toast = document.getElementById('toast');
      const totalItemsSpan = document.getElementById('totalItems');
      const backArrow = document.getElementById('backArrow');

      // State
      let toastTimeout;

      // Make adjustQuantity function globally available
      window.adjustQuantity = function(btn, change) {
        const card = btn.closest('.product-card');
        const productId = card.dataset.productId;
        const quantitySpan = document.getElementById(`qty-${productId}`);
        let currentQty = parseInt(quantitySpan.textContent);
        
        // Update quantity (minimum 0)
        let newQty = currentQty + change;
        if (newQty < 0) newQty = 0;
        quantitySpan.textContent = newQty;
        
        // Visual feedback
        btn.style.transform = 'scale(0.9)';
        setTimeout(() => {
          btn.style.transform = '';
        }, 100);
        
        // Update total items count
        updateTotalItems();
      };

      // Update total items count
      function updateTotalItems() {
        const allQuantities = document.querySelectorAll('[id^="qty-"]');
        let total = 0;
        allQuantities.forEach(qtySpan => {
          total += parseInt(qtySpan.textContent) || 0;
        });
        totalItemsSpan.textContent = total;
        return total;
      }

      // Show toast function
      function showToast(message, isSuccess = true) {
        if (toastTimeout) clearTimeout(toastTimeout);
        toast.textContent = message;
        toast.classList.add('show');
        
        // Add success animation to button
        if (isSuccess) {
          confirmBtn.classList.add('success');
          setTimeout(() => {
            confirmBtn.classList.remove('success');
          }, 500);
        }
        
        toastTimeout = setTimeout(() => {
          toast.classList.remove('show');
        }, 2500);
      }

      // Confirm order button click
      confirmBtn.addEventListener('click', () => {
        const totalItems = updateTotalItems();
        
        if (totalItems === 0) {
          showToast('Add some items first 🛒', false);
        } else {
          showToast('Order placed successfully 🎉', true);
          
          // Optional: reset all quantities to 0 after order? 
          // For demo, we'll keep them as is, but could add:
          // setTimeout(() => {
          //   if (confirm('Reset quantities?')) {
          //     document.querySelectorAll('[id^="qty-"]').forEach(qty => qty.textContent = '0');
          //     updateTotalItems();
          //   }
          // }, 1000);
        }
      });

      // Back arrow navigation
      backArrow.addEventListener('click', (e) => {
        console.log('navigating to dashboard.html');
      });

      // Add tap simulation for all buttons
      const allButtons = document.querySelectorAll('button');
      allButtons.forEach(btn => {
        btn.addEventListener('click', (e) => {
          console.log('tap simulated');
        });
      });

      // Initialize total
      updateTotalItems();

      // Add some friendly touch to product cards
      const productCards = document.querySelectorAll('.product-card');
      productCards.forEach(card => {
        card.addEventListener('click', (e) => {
          // only if not clicking directly on buttons
          if (!e.target.closest('button')) {
            console.log('product card tapped');
          }
        });
      });

    })();
  </script>

  <!-- design fully respects:
    - Background: soft peach pastel (#FFE5D0 → #FFD9B8)
    - Product grid: 2-column layout, big square cards
    - Each card: image occupies 70% (emoji fallback), product name below
    - Large circular + and - buttons: mustard background, white text
    - Quantity number big and bold
    - Bottom: Confirm Order button (muted teal, 80px height, white text)
    - On click: soft success animation + toast "Order placed successfully"
    - Fully responsive (grid adapts on smaller screens)
    - Back arrow to dashboard.html
    - Total items counter
  -->
</body>
</html>
